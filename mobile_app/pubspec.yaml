name: access_control
description: Access Control Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.6 <3.0.0'

dependencies:
  cupertino_icons: ^1.0.2
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_flavorizr: ^2.3.0
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  intl: any
  ndef: ^0.3.4
  supabase_flutter: ^2.9.1

dependency_overrides:
  analyzer: ^7.0.0

dev_dependencies:
  custom_lint: ^0.7.0
  flutter_lints: ^2.0.0
  flutter_test:
    sdk: flutter
  intl_translation: ^0.20.0
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/
    - .env

flavorizr:
  flavors:
    dev:
      app:
        name: "dev Access Control"
      android:
        applicationId: "com.aaacko.supej.access.control.dev"
        icon: "assets/icons/logo_dev.png"
      ios:
        bundleId: "com.aaacko.supej.access.control.dev"
        icon: "assets/icons/logo_dev.png"
    
    prod:
      app:
        name: "Access Control"
      android:
        applicationId: "com.aaacko.supej.access.control"
        icon: "assets/icons/logo.png"
      ios:
        bundleId: "com.aaacko.supej.access.control"
        icon: "assets/icons/logo.png"